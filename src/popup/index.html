<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrPlug</title>
  <link rel="stylesheet" href="../styles/carbon-lite.css">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 0;
    }
    .dropdown-menu {
      display: flex;
      flex-direction: column;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: var(--cds-spacing-05);
      padding: var(--cds-spacing-05) var(--cds-spacing-06);
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--cds-text-primary);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.875rem;
      text-align: left;
      cursor: pointer;
      transition: background var(--cds-transition-fast);
    }
    .menu-item:hover {
      background: var(--cds-background-hover);
    }
    .menu-item:active {
      background: var(--cds-background-active);
    }
    .menu-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .menu-divider {
      height: 1px;
      background: var(--cds-border-subtle);
      margin: var(--cds-spacing-03) 0;
    }
    .menu-header {
      padding: var(--cds-spacing-05) var(--cds-spacing-06);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--cds-text-secondary);
      letter-spacing: 0.32px;
      text-transform: uppercase;
    }
    .menu-footer {
      padding: var(--cds-spacing-05) var(--cds-spacing-06);
      font-size: 0.75rem;
      color: var(--cds-text-secondary);
      background: var(--cds-layer-01);
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-left: auto;
    }
    .status-configured {
      background: #24a148;
    }
    .status-not-configured {
      background: var(--cds-border-strong);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
